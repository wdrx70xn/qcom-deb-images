name: EFS Maintenance
'on':
  schedule:
  - cron: 0 5 * * 1
  workflow_dispatch:
    inputs:
      create_new_location:
        description: Create new EFS location (/efs/qli/qcom-deb-images)
        type: boolean
        default: false
      cleanup_old_location:
        description: Remove old EFS data (/efs/qli/metaqcom/gh-runners/quic-yocto/downloads/qcom-deb-images)
        type: boolean
        default: false
      age_cleanup:
        description: Remove build artifacts older than max_age_days
        type: boolean
        default: false
      max_age_days:
        description: Maximum age in days for build artifacts (used with age_cleanup)
        type: string
        default: '30'
permissions:
  contents: read
env:
  EFS_NEW_PATH: /efs/qli/qcom-deb-images
  EFS_OLD_PATH: /efs/qli/metaqcom/gh-runners/quic-yocto/downloads/qcom-deb-images
jobs:
  efs-maintenance:
    name: EFS maintenance
    if: github.repository == 'qualcomm-linux/qcom-deb-images'
    runs-on: ubuntu-latest
    steps:
    - name: Create new EFS location
      if: ${{ inputs.create_new_location }}
      run: 'set -ux

        mkdir -vp "${EFS_NEW_PATH}"

        '
    - name: Clean up old EFS location
      if: ${{ inputs.cleanup_old_location }}
      run: 'set -ux

        rm -rfv "${EFS_OLD_PATH}"

        '
    - name: Age-based cleanup of build artifacts
      if: ${{ inputs.age_cleanup || github.event_name == 'schedule' }}
      run: "set -ux\nmax_age_days=\"${{ inputs.max_age_days }}\"\n\nif [ ! -d \"${EFS_NEW_PATH}\"\
        \ ]; then\n  echo \"New EFS directory ${EFS_NEW_PATH} does not exist, skipping\"\
        \n  exit 0\nfi\n\n# resolve absolute paths of all symlink targets to determine\
        \ which\n# active build directories to keep\nactive=$(find \"${EFS_NEW_PATH}\"\
        \ -maxdepth 1 -type l \\\n         | xargs -r readlink -f | sort -u)\necho\
        \ \"Active symlink targets:\"\necho \"${active:-<none>}\"\n\n# walk build\
        \ directories one level deep under qualcomm-linux/,\n# removing those older\
        \ than max_age_days that are not currently\n# referenced by a symlink\nfind\
        \ \"${EFS_NEW_PATH}\" \\\n    -maxdepth 1 -mindepth 1 -type d \\\n    -mtime\
        \ \"+${max_age_days}\" \\\n| while IFS= read -r dir; do\n  if echo \"${active}\"\
        \ | grep -qxF \"$(readlink -f \"${dir}\")\"; then\n    echo \"Keeping ${dir}:\
        \ still referenced by a symlink\"\n  else\n    echo \"Removing old build:\
        \ ${dir}\"\n    rm -rfv \"${dir}\"\n  fi\ndone\n"
