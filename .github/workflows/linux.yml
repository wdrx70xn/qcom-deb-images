name: Build Linux kernel deb and debos image
'on':
  workflow_call:
    inputs:
      kernel_name:
        description: 'Name of the kernel to build (default: mainline)'
        required: false
        type: string
        default: mainline
      debos_extra_args:
        description: Extra arguments to pass to debos (e.g. -t dtb:qcom/some.dtb)
        required: false
        type: string
        default: ''
      build_linux_deb_extra_args:
        description: Extra arguments to pass to build-linux-deb.py
        required: false
        type: string
        default: ''
      skip_qemu_tests:
        description: Skip QEMU tests
        required: false
        type: boolean
        default: false
      skip_lava_tests:
        description: Skip LAVA tests
        required: false
        type: boolean
        default: false
      lava_boards_include:
        description: JSON array of board names to include in LAVA tests (empty = all
          boards)
        required: false
        type: string
        default: ''
      lava_boards_exclude:
        description: JSON array of board names to exclude from LAVA tests (empty =
          none excluded)
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      kernel_name:
        description: 'Name of the kernel to build (default: mainline)'
        required: false
        type: string
      debos_extra_args:
        description: Extra arguments to pass to debos (e.g. -t dtb:qcom/some.dtb)
        required: false
        type: string
      build_linux_deb_extra_args:
        description: Extra arguments to pass to build-linux-deb.py
        required: false
        type: string
permissions:
  checks: write
  contents: read
  packages: read
  pull-requests: write
env:
  BUILD_ID: ${{ github.event.repository.name }}-${{ github.run_id }}-${{ github.run_attempt
    }}
  KERNEL_NAME: ${{ inputs.kernel_name || 'mainline' }}
  BUILD_LINUX_DEB_EXTRA_ARGS: ${{ inputs.build_linux_deb_extra_args }}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.kernel_name || 'mainline'
    }}
  cancel-in-progress: true
jobs:
  build-linux-deb:
    if: github.repository == 'qualcomm-linux/qcom-deb-images' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container:
      image: public.ecr.aws/debian/debian:trixie
      volumes:
      - /efs/qli/qcom-deb-images:/efs
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Update OS packages
      run: 'set -ux

        apt update

        apt -y upgrade

        apt -y full-upgrade

        '
    - name: Build Linux kernel deb
      run: "set -ux\n# download arm64 package lists to install cross build-dependencies\n\
        if [ \"$(dpkg --print-architecture)\" != arm64 ]; then\n    dpkg --add-architecture\
        \ arm64\n    apt update\nfi\n# install build-dependencies; TODO: --no-install-recommends\n\
        apt -y install git crossbuild-essential-arm64 make flex bison bc \\\n    libdw-dev\
        \ libelf-dev libssl-dev libssl-dev:arm64 dpkg-dev \\\n    debhelper kmod python3\
        \ rsync coreutils\nscripts/build-linux-deb.py ${BUILD_LINUX_DEB_EXTRA_ARGS}\
        \ \\\n    `ls kernel-configs/*.config | sort` \\\n"
    - name: Stage artifacts for upload
      run: 'set -ux

        # dcmd from devscripts will be used to parse .changes file

        apt -y install --no-install-recommends devscripts

        # stage artifacts in a directory

        mkdir -v artifacts

        cp -av `dcmd *.changes` artifacts

        '
    - name: Upload results to EFS
      run: 'set -ux

        export BUILD_DIR="/efs/${BUILD_ID}"

        mkdir -vp "${BUILD_DIR}"

        cp -av artifacts/* "${BUILD_DIR}"

        # create or update symlink

        ln -fnsv "${BUILD_ID}" "/efs/${KERNEL_NAME}"

        # perhaps help NFS sync

        sync

        '
    - name: Upload private artifacts
      uses: qualcomm-linux/upload-private-artifact-action@aws-v4
      id: upload_artifacts
      with:
        path: artifacts
        s3_bucket: qcom-prd-gh-artifacts
        destination: ${{ github.repository_owner }}/${{ github.event.repository.name
          }}/${{ github.run_id }}-${{ github.run_attempt }}/
  debos-linux-deb:
    needs: build-linux-deb
    uses: ./.github/workflows/debos.yml
    with:
      kernelpackage: efs/${{ inputs.kernel_name || 'mainline' }}
      debos_extra_args: ${{ inputs.debos_extra_args }}
      skip_qemu_tests: ${{ inputs.skip_qemu_tests || false }}
  test-linux-deb:
    if: ${{ !inputs.skip_lava_tests }}
    uses: ./.github/workflows/lava-test.yml
    needs: debos-linux-deb
    secrets: inherit
    with:
      url: ${{ needs.debos-linux-deb.outputs.artifacts_url }}
      suite: trixie
      boards_include: ${{ inputs.lava_boards_include }}
      boards_exclude: ${{ inputs.lava_boards_exclude }}
